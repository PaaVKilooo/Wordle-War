<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle War 2026</title>
    <link rel="icon" type="image/png" href="wwicon.png">
    <style>
        :root { --bg: #121213; --text: #ffffff; --green: #538d4e; --gray: #818384; --dark-gray: #3a3a3c; }
        body { font-family: 'Courier New', Courier, monospace; background-color: var(--bg); color: var(--text); text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: 0 auto; border: 2px solid var(--dark-gray); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1, h2, h3 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        select, textarea, button { width: 100%; box-sizing: border-box; margin: 10px 0; padding: 12px; border-radius: 6px; font-family: inherit; font-size: 16px; }
        textarea { background: var(--bg); color: var(--text); border: 2px solid var(--dark-gray); resize: none; }
        select { background: var(--dark-gray); color: var(--text); border: none; font-weight: bold; }
        button { background-color: var(--green); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        button:active { transform: scale(0.95); }
        .secondary-btn { background-color: var(--dark-gray); }
        #status { color: var(--gray); font-size: 0.9em; min-height: 20px; font-weight: bold; }
        .hidden { display: none; }
        .score-card { font-size: 28px; font-weight: bold; margin: 15px 0; padding: 15px; border: 2px solid var(--green); border-radius: 8px; background: rgba(83, 141, 78, 0.1); }
        
        /* New Styles for the Daily Grids */
        .grids-wrapper { display: flex; gap: 10px; justify-content: space-between; margin-top: 20px; text-align: left; }
        .grid-box { flex: 1; border: 1px solid var(--dark-gray); border-radius: 8px; padding: 10px; background: #1a1a1b; display: flex; flex-direction: column; }
        .grid-box h4 { margin: 0 0 10px 0; color: var(--green); text-align: center; border-bottom: 1px solid var(--dark-gray); padding-bottom: 5px; }
        pre { margin: 0; font-family: inherit; font-size: 0.85em; white-space: pre-wrap; line-height: 1.3; flex-grow: 1; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--gray); }
        
        .archive-note { font-size: 0.8em; color: var(--gray); margin-top: 20px; }
    </style>
</head>
<body>

    <div id="mainMenu" class="container">
        <h2>WORDLE WAR</h2>
        <img src="wwicon.png" alt="Wordle War Logo" style="width: 80px; margin-bottom: 10px; border-radius: 8px;">
        <p style="color: var(--gray); margin-bottom: 20px;">Welcome back!!.</p>
        
        <button onclick="showPage('entryPage')">Log Today's Score</button>
        <button onclick="showPage('scorePage')">View Leaderboard & Grids</button>
    </div>

    <div id="entryPage" class="container hidden">
        <h2>LOG ENTRY</h2>
        <select id="player">
            <option value="Virat">I am Virat</option>
            <option value="Kavin">I am Kavin</option>
        </select>
        
        <textarea id="wordleInput" rows="5" placeholder="Paste your full Wordle result here..."></textarea>
        
        <button onclick="submitScore()">Submit Score</button>
        <button class="secondary-btn" onclick="showPage('mainMenu')">Back to Menu</button>
        <p id="status"></p>
    </div>

    <div id="scorePage" class="container hidden">
        <h2>LEADERBOARD</h2>
        
        <div class="score-card" id="scoreDisplay">
            Virat: 0 <br> Kavin: 0
        </div>
        
        <p id="pendingStatus" style="color: var(--gray); font-size: 0.9em;">Loading matches...</p>

        <div style="margin-top: 25px; border-top: 2px dashed var(--dark-gray); padding-top: 15px;">
            <h3>TODAY'S MATCH (<span id="todayLabel">...</span>)</h3>
            <div class="grids-wrapper">
                <div class="grid-box">
                    <h4>VIRAT</h4>
                    <pre id="viratGrid">Loading...</pre>
                </div>
                <div class="grid-box">
                    <h4>KAVIN</h4>
                    <pre id="kavinGrid">Loading...</pre>
                </div>
            </div>
        </div>
        
        <br>
        <button onclick="backgroundFetch(true)">Refresh Cloud Data</button>
        <button class="secondary-btn" onclick="showPage('mainMenu')">Back to Menu</button>
    </div>

    <script>
        // 🚨 PASTE YOUR LATEST WEB APP URL HERE 🚨
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw7Nv3KKtYEXD_3xyaDe7rw9cDEWi0TbXp-oJFZDYd0pP04rpH1N0EHxYZZezCHG9G9/exec";

        window.onload = () => { backgroundFetch(false); };

        function showPage(pageId) {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('entryPage').classList.add('hidden');
            document.getElementById('scorePage').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }

        async function backgroundFetch(isManualRefresh) {
            const pendingEl = document.getElementById('pendingStatus');
            if (isManualRefresh) pendingEl.innerText = "Refreshing from cloud...";
            else pendingEl.innerText = "Syncing background data...";
            
            try {
                const response = await fetch(SCRIPT_URL);
                const json = await response.json();
                
                if (json.result === "success") {
                    processData(json.data);
                } else {
                    pendingEl.innerText = "❌ Database error.";
                }
            } catch (error) {
                pendingEl.innerText = "❌ Connection error.";
            }
        }

        function submitScore() {
            const raw = document.getElementById('wordleInput').value.trim();
            const player = document.getElementById('player').value;
            const statusEl = document.getElementById('status');
            
            const formatMatch = raw.match(/Wordle\s*([\d,]+)\s*([1-6X])\/6/);
            if (!formatMatch) {
                statusEl.innerText = "❌ Invalid Format! Make sure you paste the whole result.";
                return;
            }

            const num = formatMatch[1].replace(',', '');
            const score = formatMatch[2] === 'X' ? 7 : parseInt(formatMatch[2]);

            statusEl.innerText = "⏳ Syncing with Ledger...";

            const form = document.createElement('form');
            form.action = SCRIPT_URL;
            form.method = 'POST';
            
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'payload';
            // NEW: Sending the raw text to the database
            input.value = JSON.stringify({ wordleNum: num, player: player, score: score, rawText: raw });
            form.appendChild(input);

            let iframe = document.getElementById('hidden_iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.name = 'hidden_iframe';
                iframe.id = 'hidden_iframe';
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
            }
            form.target = 'hidden_iframe';
            document.body.appendChild(form);
            form.submit();

            setTimeout(() => {
                document.body.removeChild(form); 
                statusEl.innerText = "✅ Logged successfully!";
                document.getElementById('wordleInput').value = ""; 
                backgroundFetch(false); 
                
                setTimeout(() => {
                    statusEl.innerText = "";
                    showPage('scorePage'); // Auto-jump to the grids to see the result!
                }, 1000);
            }, 2000);
        }

        function processData(rows) {
            let points = { Virat: 0, Kavin: 0 };
            let matches = {};
            let pendingCount = 0;
            let latestWordleNum = 0;

            // 1. Group data and find the highest Wordle number
            rows.forEach(row => {
                let wordleNum = parseInt(row[1]);
                let playerName = row[2];
                let score = row[3];
                let rawGrid = row[4]; // The new Column E
                
                if (wordleNum > latestWordleNum) latestWordleNum = wordleNum;

                if (!matches[wordleNum]) matches[wordleNum] = {};
                matches[wordleNum][playerName] = { score: score, grid: rawGrid };
            });

            // 2. Calculate winners
            for (let id in matches) {
                if (matches[id].Virat && matches[id].Kavin) {
                    if (matches[id].Virat.score < matches[id].Kavin.score) points.Virat++;
                    else if (matches[id].Kavin.score < matches[id].Virat.score) points.Kavin++;
                } else {
                    pendingCount++;
                }
            }

            // 3. Update Leaderboard HTML
            document.getElementById('scoreDisplay').innerHTML = `Virat: ${points.Virat} <br> Kavin: ${points.Kavin}`;
            
            if (pendingCount > 0) {
                document.getElementById('pendingStatus').innerText = ` `;
            } else {
                document.getElementById('pendingStatus').innerText = "✅ All matches concluded! Up to date.";
            }

            // 4. Update the "Today's Grid" HTML
            document.getElementById('todayLabel').innerText = latestWordleNum > 0 ? latestWordleNum : "---";
            
            if (latestWordleNum > 0 && matches[latestWordleNum]) {
                const viratData = matches[latestWordleNum].Virat;
                const kavinData = matches[latestWordleNum].Kavin;
                
                // Format Virat's grid
                let vText = "Virat did not play yet";
                if (viratData) {
                    vText = viratData.grid ? viratData.grid : `Played! Score: ${viratData.score}/6\n(Grid not saved)`;
                }
                document.getElementById('viratGrid').innerText = vText;

                // Format Kavin's grid
                let kText = "Kavin did not play yet";
                if (kavinData) {
                    kText = kavinData.grid ? kavinData.grid : `Played! Score: ${kavinData.score}/6\n(Grid not saved)`;
                }
                document.getElementById('kavinGrid').innerText = kText;
            } else {
                document.getElementById('viratGrid').innerText = "No data yet";
                document.getElementById('kavinGrid').innerText = "No data yet";
            }
        }
    </script>
</body>
</html>
